<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>tl小站 · 主页</title>
    <!-- 使用 Primer 风格 (柔和现代化) + Font Awesome 图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 定义亮色/暗色主题的CSS变量 (取自blogbase配色灵感) */
        :root {
            --bg-gradient-start: #f9fafc;
            --bg-gradient-end: #eef1f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-bg-solid: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-light: #e2e8f0;
            --accent: #006b75;          /* commentLabelColor */
            --accent-soft: #e6f3f5;
            --tag-bg: #eef2f6;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 4px 10px rgba(0, 0, 0, 0.02);
            --header-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            --avatar-border: #ffffff;
            --theme-toggle-bg: #ffffff;
            --theme-toggle-icon: #334155;
            --card-border: rgba(0, 0, 0, 0.02);
            --year-dot-1: #bc4c00;       /* 取自yearColorList */
            --year-dot-2: #0969da;
            --year-dot-3: #1f883d;
            --year-dot-4: #A333D0;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #0b1a24;
            --bg-gradient-end: #14242f;
            --card-bg: rgba(22, 36, 48, 0.85);
            --card-bg-solid: #1e2f3b;
            --text-primary: #e9edf0;
            --text-secondary: #b4c6d0;
            --border-light: #2e4050;
            --accent: #58a6b5;           /* 亮一点的青色 */
            --accent-soft: #1e404b;
            --tag-bg: #2b3e4b;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --header-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            --avatar-border: #2e4050;
            --theme-toggle-bg: #1f3845;
            --theme-toggle-icon: #d1dce3;
            --card-border: #2e4a5a;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s, color 0.2s;
            padding: 2rem 1.5rem;
            backdrop-filter: blur(0px);
            margin: 0;
        }

        /* 平滑容器 */
        .blog-wrapper {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 头部卡片 ———— 个人资料区 */
        .profile-header {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-light);
            border-radius: 2.5rem;
            padding: 2rem 2.5rem;
            margin-bottom: 3rem;
            box-shadow: var(--header-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            transition: background 0.3s, border 0.3s;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            flex-wrap: wrap;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--card-bg-solid);
            padding: 5px;
            border: 2px solid var(--avatar-border);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            transition: transform 0.25s ease;
        }
        .avatar:hover {
            transform: scale(1.02);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #f0f3f7;
        }

        .title-group h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
            line-height: 1.2;
        }

        .title-group .sub-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .sub-title i {
            color: var(--accent);
            font-size: 1rem;
            opacity: 0.8;
        }

            background: var(--theme-toggle-bg);
            border: 1px
